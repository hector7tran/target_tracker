<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Goals 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background: #f8fafc; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root">
        <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; color:#1e3a8a;">
            <p style="font-weight:bold; font-size:14px;">ĐANG KHỞI TẠO HỆ THỐNG...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbxK66Jjtd_IvOkMBAEVglKCM9huiI0mDaWcC5cDqaVAze6_WyJlSGxsoergXDUBxwRz/exec";

        // TỰ ĐỊNH NGHĨA ICON SVG (Không phụ thuộc thư viện ngoài)
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6m12 5h1.5a2.5 2.5 0 0 0 0-5H18M9 22h6m-3-15V2m-4 20h8a2 2 0 0 0 2-2V9H6v11a2 2 0 0 0 2 2Z"/>,
                calendar: <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4M8 2v4m3 8h1m-1 4h1m-4-4h1m-1 4h1m3-4h1m-1 4h1M3 10h18"/>,
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.72V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>,
                flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>,
                chevronRight: <path d="m9 18 6-6-6-6"/>,
                plus: <path d="M5 12h14m-7-7v14"/>,
                camera: <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>,
                x: <path d="M18 6 6 18M6 6l12 12"/>,
                chevronLeft: <path d="m15 18-6-6 6-6"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [currentUser, setCurrentUser] = useState('Tài Đức');
            const [appData, setAppData] = useState({ goals: [], history: [] });
            const [isLoading, setIsLoading] = useState(true);
            const [selectedTask, setSelectedTask] = useState(null);
            const [viewDate, setViewDate] = useState(new Date());

            useEffect(() => { fetchData(); }, []);

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const res = await fetch(`${GAS_URL}?action=getAppData`);
                    const data = await res.json();
                    setAppData(data || { goals: [], history: [] });
                } catch (e) {
                    setAppData({
                        goals: [
                            { user: 'Tài Đức', title: 'Mục tiêu 2026', tasks: ['Đi tập Gym', 'Học BĐS'] },
                            { user: 'Hồng Vân', title: 'Mục tiêu 2026', tasks: ['Làm bánh Âu', 'Tập bơi'] }
                        ],
                        history: []
                    });
                } finally {
                    setIsLoading(false);
                }
            };

            const handleAction = async (action, data) => {
                setIsLoading(true);
                try {
                    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action, data }) });
                    setTimeout(fetchData, 2500);
                } catch (e) {
                    alert("Lỗi kết nối!");
                    setIsLoading(false);
                }
            };

            const calendarDays = useMemo(() => {
                const year = viewDate.getFullYear();
                const month = viewDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push({ day: null, fullDate: null });
                for (let i = 1; i <= daysInMonth; i++) {
                    const d = i < 10 ? `0${i}` : i;
                    const m = (month + 1) < 10 ? `0${month + 1}` : month + 1;
                    days.push({ day: i, fullDate: `${year}-${m}-${d}` });
                }
                return days;
            }, [viewDate]);

            const users = appData.goals.length > 0 ? [...new Set(appData.goals.map(g => g.user))] : ['Tài Đức', 'Hồng Vân'];

            return (
                <div className="min-h-screen pb-24 max-w-lg mx-auto bg-slate-50">
                    <header className="bg-blue-900 text-white p-6 rounded-b-[2.5rem] shadow-xl sticky top-0 z-40">
                        <div className="flex justify-between items-center">
                            <h1 className="text-xl font-bold italic uppercase tracking-tighter">Family 2026</h1>
                            <div className="flex -space-x-2">
                                {users.map(u => (
                                    <button key={u} onClick={() => setCurrentUser(u)} className={`w-10 h-10 rounded-full border-2 flex items-center justify-center text-[10px] font-bold transition-all ${currentUser === u ? 'border-white bg-blue-500 scale-110' : 'border-blue-400 bg-blue-800 opacity-40'}`}>
                                        {u.substring(0, 2).toUpperCase()}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="p-4">
                        {isLoading && (
                            <div className="fixed inset-0 bg-white/70 z-[100] flex flex-col items-center justify-center">
                                <div className="animate-spin rounded-full h-8 w-8 border-4 border-blue-900 border-t-transparent mb-2"></div>
                                <p className="text-blue-900 text-[10px] font-bold">ĐANG CẬP NHẬT...</p>
                            </div>
                        )}

                        {activeTab === 'dashboard' && (
                            <div className="space-y-4 animate-in">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white p-4 rounded-3xl shadow-sm border border-blue-50 flex items-center gap-3">
                                        <Icon name="flame" className="text-orange-500" />
                                        <div><p className="text-[9px] text-gray-400 font-bold uppercase">Streak</p><p className="font-bold text-lg">5</p></div>
                                    </div>
                                    <div className="bg-white p-4 rounded-3xl shadow-sm border border-blue-50 flex items-center gap-3">
                                        <Icon name="trophy" className="text-blue-600" />
                                        <div><p className="text-[9px] text-gray-400 font-bold uppercase">Xong</p><p className="font-bold text-lg">{appData.history.filter(h => h.user === currentUser).length}</p></div>
                                    </div>
                                </div>

                                {appData.goals.filter(g => g.user === currentUser).map((goal, i) => (
                                    <div key={i} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                                        <div className="bg-blue-50 px-5 py-3 border-b border-blue-100 flex justify-between">
                                            <span className="font-bold text-blue-900 text-xs uppercase">{goal.title}</span>
                                        </div>
                                        <div className="divide-y divide-slate-50">
                                            {goal.tasks.map((task, j) => (
                                                <button key={j} onClick={() => setSelectedTask({ goal: goal.title, task: task })} className="w-full flex items-center justify-between p-5 text-left active:bg-blue-50 transition">
                                                    <span className="text-sm font-semibold text-slate-600">{task}</span>
                                                    <Icon name="chevronRight" size={16} className="text-slate-300" />
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'calendar' && (
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 animate-in">
                                <div className="flex items-center justify-between mb-4">
                                    <button onClick={() => setViewDate(new Date(viewDate.setMonth(viewDate.getMonth() - 1)))}><Icon name="chevronLeft" /></button>
                                    <h3 className="font-bold text-blue-900 text-xs uppercase">T{viewDate.getMonth() + 1}/{viewDate.getFullYear()}</h3>
                                    <button onClick={() => setViewDate(new Date(viewDate.setMonth(viewDate.getMonth() + 1)))}><Icon name="chevronRight" /></button>
                                </div>
                                <div className="grid grid-cols-7 gap-1">
                                    {['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'].map(d => <div key={d} className="text-center text-[8px] font-black text-slate-300 uppercase">{d}</div>)}
                                    {calendarDays.map((date, i) => {
                                        const logs = appData.history.filter(h => h.timestamp && h.timestamp.split('T')[0] === date.fullDate);
                                        return (
                                            <div key={i} className="aspect-square flex flex-col items-center justify-center relative">
                                                {date.day && (
                                                    <>
                                                        <span className={`text-xs ${date.fullDate === new Date().toISOString().split('T')[0] ? 'text-blue-600 font-bold' : 'text-slate-400'}`}>{date.day}</span>
                                                        <div className="flex gap-0.5 mt-0.5">
                                                            {logs.map((h, idx) => <div key={idx} className={`w-1 h-1 rounded-full ${h.user === 'Tài Đức' ? 'bg-blue-600' : 'bg-pink-500'}`}></div>)}
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 p-4 pb-8 flex justify-around z-50">
                        <button onClick={() => setActiveTab('dashboard')} className={activeTab === 'dashboard' ? 'text-blue-900' : 'text-slate-300'}><Icon name="trophy" /></button>
                        <button onClick={() => setActiveTab('calendar')} className={activeTab === 'calendar' ? 'text-blue-900' : 'text-slate-300'}><Icon name="calendar" /></button>
                    </nav>

                    {selectedTask && (
                        <div className="fixed inset-0 bg-blue-900/40 backdrop-blur-md z-[60] flex items-end justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl animate-in">
                                <div className="flex justify-between items-start mb-4">
                                    <div><p className="text-[9px] font-bold text-blue-400 uppercase tracking-widest">{selectedTask.goal}</p><h3 className="text-lg font-bold">{selectedTask.task}</h3></div>
                                    <button onClick={() => setSelectedTask(null)}><Icon name="x" /></button>
                                </div>
                                <div className="space-y-4">
                                    <textarea id="taskResult" className="w-full bg-slate-50 rounded-2xl p-4 text-sm outline-none focus:ring-2 focus:ring-blue-500" rows="3" placeholder="Kết quả..."></textarea>
                                    <label className="flex items-center justify-center gap-3 w-full py-4 border-2 border-dashed border-slate-200 rounded-[2rem] text-slate-400 cursor-pointer">
                                        <Icon name="camera" /> <span className="text-[10px] font-bold uppercase tracking-tight">Chụp ảnh</span>
                                        <input type="file" accept="image/*" className="hidden" id="taskImage" />
                                    </label>
                                    <button onClick={() => {
                                        const res = document.getElementById('taskResult').value;
                                        if (!res) return alert("Vui lòng nhập kết quả!");
                                        const send = (b64) => {
                                            handleAction("completeTask", { user: currentUser, goal: selectedTask.goal, task: selectedTask.task, result: res, image: b64, fileName: `IMG_${Date.now()}.jpg` });
                                            setSelectedTask(null);
                                        };
                                        const imgIn = document.getElementById('taskImage');
                                        if (imgIn.files[0]) {
                                            const r = new FileReader(); r.onload = (e) => send(e.target.result); r.readAsDataURL(imgIn.files[0]);
                                        } else send(null);
                                    }} className="w-full bg-blue-900 text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-xl">GỬI KẾT QUẢ</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</body>
</html>
