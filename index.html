<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Goals 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; margin: 0; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #1e3a8a; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .active-scale:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxK66Jjtd_IvOkMBAEVglKCM9huiI0mDaWcC5cDqaVAze6_WyJlSGxsoergXDUBxwRz/exec";

        // Thành phần vẽ Icon SVG thủ công
        const SvgIcon = (name) => {
            const paths = {
                trophy: "M6 9H4.5a2.5 2.5 0 0 1 0-5H6m12 5h1.5a2.5 2.5 0 0 0 0-5H18M9 22h6m-3-15V2m-4 20h8a2 2 0 0 0 2-2V9H6v11a2 2 0 0 0 2 2Z",
                flame: "M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z",
                plus: "M5 12h14m-7-7v14",
                camera: "M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z",
                x: "M18 6 6 18M6 6l12 12",
                chevron: "m9 18 6-6-6-6"
            };
            return e('svg', { width: 20, height: 20, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" },
                e('path', { d: paths[name] }),
                name === 'camera' ? e('circle', { cx: 12, cy: 13, r: 3 }) : null
            );
        };

        const App = () => {
            const [currentUser, setCurrentUser] = React.useState('Tài Đức');
            const [isLoading, setIsLoading] = React.useState(true);
            const [selectedTask, setSelectedTask] = React.useState(null);
            const [appData, setAppData] = React.useState({
                goals: [
                    { user: 'Tài Đức', title: 'Mục tiêu 2026', tasks: ['Đi tập Gym', 'Học BĐS cá nhân', 'Đọc sách', 'Học tiếng Trung'] },
                    { user: 'Hồng Vân', title: 'Mục tiêu 2026', tasks: ['Học làm bánh Âu', 'Tập bơi cùng con', 'Quay phim điện thoại', 'Đọc sách'] }
                ],
                history: []
            });

            React.useEffect(() => {
                const timer = setTimeout(() => setIsLoading(false), 2500); // Tự động mở App sau 2.5s dù load xong hay chưa
                fetch(`${GAS_URL}?action=getAppData`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.goals) setAppData(data);
                        setIsLoading(false);
                        clearTimeout(timer);
                    })
                    .catch(() => setIsLoading(false));
            }, []);

            const handleComplete = async () => {
                const resText = document.getElementById('taskRes').value;
                const imgFile = document.getElementById('taskImg').files[0];
                if (!resText) return alert("Vui lòng nhập kết quả!");

                setIsLoading(true);
                const send = async (base64) => {
                    const payload = {
                        action: "completeTask",
                        data: { user: currentUser, goal: selectedTask.goal, task: selectedTask.task, result: resText, image: base64, fileName: `IMG_${Date.now()}.jpg` }
                    };
                    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    alert("Đã gửi! Hệ thống sẽ cập nhật sau giây lát.");
                    setIsLoading(false);
                    setSelectedTask(null);
                };

                if (imgFile) {
                    const reader = new FileReader();
                    reader.onload = (ev) => send(ev.target.result);
                    reader.readAsDataURL(imgFile);
                } else send(null);
            };

            if (isLoading && appData.history.length === 0) {
                return e('div', { className: "flex flex-col items-center justify-center h-screen" },
                    e('div', { className: "spinner" }),
                    e('p', { className: "mt-4 font-bold text-blue-900" }, "HỆ THỐNG ĐANG SẴN SÀNG...")
                );
            }

            return e('div', { className: "min-h-screen max-w-md mx-auto bg-white shadow-2xl pb-24" },
                // Header
                e('header', { className: "bg-blue-900 text-white p-6 rounded-b-[2rem] shadow-lg flex justify-between items-center" },
                    e('h1', { className: "text-xl font-black italic uppercase" }, "Family 2026"),
                    e('div', { className: "flex gap-2" },
                        ['Tài Đức', 'Hồng Vân'].map(u => e('button', {
                            key: u,
                            onClick: () => setCurrentUser(u),
                            className: `px-3 py-1 rounded-full text-[10px] font-bold border transition-all ${currentUser === u ? 'bg-white text-blue-900' : 'opacity-50 text-white'}`
                        }, u.toUpperCase()))
                    )
                ),
                // Main Content
                e('main', { className: "p-4 space-y-6" },
                    // Stats
                    e('div', { className: "grid grid-cols-2 gap-4" },
                        e('div', { className: "bg-orange-50 p-4 rounded-3xl border border-orange-100 flex items-center gap-3" },
                            e('div', { className: "text-orange-600" }, SvgIcon('flame')),
                            e('div', null, e('p', { className: "text-[10px] font-bold text-orange-400 uppercase" }, "Streak"), e('p', { className: "font-black text-lg" }, "5"))
                        ),
                        e('div', { className: "bg-blue-50 p-4 rounded-3xl border border-blue-100 flex items-center gap-3" },
                            e('div', { className: "text-blue-600" }, SvgIcon('trophy')),
                            e('div', null, e('p', { className: "text-[10px] font-bold text-blue-400 uppercase" }, "Xong"), e('p', { className: "font-black text-lg" }, appData.history.filter(h => h.user === currentUser).length))
                        )
                    ),
                    // Tasks
                    e('div', { className: "space-y-4" },
                        e('h2', { className: "font-black text-slate-800 text-sm uppercase px-2" }, `Nhiệm vụ của ${currentUser}`),
                        appData.goals.filter(g => g.user === currentUser).map((goal, i) => e('div', { key: i, className: "bg-slate-50 rounded-[2rem] border border-slate-100 overflow-hidden" },
                            e('div', { className: "px-6 py-3 bg-slate-100 text-[10px] font-black text-slate-400 uppercase" }, goal.title),
                            goal.tasks.map((task, j) => e('button', {
                                key: j,
                                onClick: () => setSelectedTask({ goal: goal.title, task: task }),
                                className: "w-full p-5 flex justify-between items-center bg-white border-b border-slate-50 active-scale"
                            }, 
                                e('span', { className: "text-sm font-bold text-slate-600" }, task),
                                e('div', { className: "text-slate-200" }, SvgIcon('chevron'))
                            ))
                        ))
                    )
                ),
                // Modal
                selectedTask ? e('div', { className: "fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-end p-4" },
                    e('div', { className: "bg-white w-full rounded-[2.5rem] p-8 space-y-6 animate-bounce-in" },
                        e('div', { className: "flex justify-between items-start" },
                            e('div', null, e('p', { className: "text-[10px] font-black text-blue-500 uppercase" }, selectedTask.goal), e('h3', { className: "text-xl font-black text-slate-800" }, selectedTask.task)),
                            e('button', { onClick: () => setSelectedTask(null), className: "p-2 bg-slate-100 rounded-full" }, SvgIcon('x'))
                        ),
                        e('textarea', { id: "taskRes", className: "w-full bg-slate-50 rounded-2xl p-4 text-sm outline-none ring-blue-900 focus:ring-2", rows: 3, placeholder: "Kết quả hôm nay..." }),
                        e('label', { className: "flex items-center justify-center gap-3 w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 cursor-pointer" },
                            SvgIcon('camera'), e('span', { className: "text-xs font-bold uppercase" }, "Chụp bằng chứng"),
                            e('input', { type: "file", id: "taskImg", accept: "image/*", className: "hidden" })
                        ),
                        e('button', { onClick: handleComplete, className: "w-full bg-blue-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest active-scale" }, "GỬI HOÀN THÀNH")
                    )
                ) : null
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
