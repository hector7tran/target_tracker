<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Goals 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
        .card { transition: all 0.2s ease; }
        .card:active { transform: scale(0.98); }
        /* Hiệu ứng loading */
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #1e3a8a; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root">
        <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column;">
            <div class="spinner"></div>
            <p style="margin-top:15px; font-weight:bold; color:#1e3a8a;">HỆ THỐNG ĐANG SẴN SÀNG...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // URL của bạn
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxK66Jjtd_IvOkMBAEVglKCM9huiI0mDaWcC5cDqaVAze6_WyJlSGxsoergXDUBxwRz/exec";

        // Thành phần Icon vẽ thủ công (Không lo lỗi thư viện)
        const SvgIcon = ({ name }) => {
            const icons = {
                trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6m12 5h1.5a2.5 2.5 0 0 0 0-5H18M9 22h6m-3-15V2m-4 20h8a2 2 0 0 0 2-2V9H6v11a2 2 0 0 0 2 2Z"/>,
                flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>,
                plus: <path d="M5 12h14m-7-7v14"/>,
                camera: <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>,
                x: <path d="M18 6 6 18M6 6l12 12"/>,
                chevron: <path d="m9 18 6-6-6-6"/>
            };
            return (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState('Tài Đức');
            const [appData, setAppData] = useState({
                // Dữ liệu mặc định để app không bị trắng trang khi chưa load xong
                goals: [
                    { user: 'Tài Đức', title: 'Mục tiêu 2026', tasks: ['Đi tập Gym', 'Học BĐS cá nhân', 'Đọc sách', 'Học tiếng Trung'] },
                    { user: 'Hồng Vân', title: 'Mục tiêu 2026', tasks: ['Học làm bánh Âu', 'Tập bơi cùng con', 'Quay phim điện thoại', 'Đọc sách'] }
                ],
                history: []
            });
            const [isLoading, setIsLoading] = useState(false);
            const [selectedTask, setSelectedTask] = useState(null);

            useEffect(() => { 
                loadData(); 
            }, []);

            const loadData = async () => {
                try {
                    const res = await fetch(`${GAS_URL}?action=getAppData`);
                    const data = await res.json();
                    if (data && data.goals && data.goals.length > 0) {
                        setAppData(data);
                    }
                } catch (e) {
                    console.log("Dùng dữ liệu cục bộ");
                }
            };

            const handleComplete = async (resText, imageFile) => {
                setIsLoading(true);
                const reader = new FileReader();
                const sendRequest = async (base64) => {
                    try {
                        const payload = {
                            action: "completeTask",
                            data: {
                                user: currentUser,
                                goal: selectedTask.goal,
                                task: selectedTask.task,
                                result: resText,
                                image: base64,
                                fileName: `EVI_${Date.now()}.jpg`
                            }
                        };
                        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                        setTimeout(loadData, 2000);
                    } catch (e) {
                        alert("Lỗi kết nối");
                    } finally {
                        setIsLoading(false);
                        setSelectedTask(null);
                    }
                };

                if (imageFile) {
                    reader.onload = (e) => sendRequest(e.target.result);
                    reader.readAsDataURL(imageFile);
                } else {
                    sendRequest(null);
                }
            };

            const users = ["Tài Đức", "Hồng Vân"];

            return (
                <div className="min-h-screen max-w-md mx-auto relative shadow-2xl bg-white">
                    {/* Header */}
                    <header className="bg-blue-900 text-white p-6 rounded-b-[2rem] shadow-lg">
                        <div className="flex justify-between items-center">
                            <h1 className="text-xl font-black italic uppercase">Family 2026</h1>
                            <div className="flex gap-2">
                                {users.map(u => (
                                    <button 
                                        key={u} 
                                        onClick={() => setCurrentUser(u)} 
                                        className={`px-3 py-1 rounded-full text-[10px] font-bold border transition-all ${currentUser === u ? 'bg-white text-blue-900' : 'bg-transparent text-white opacity-50'}`}
                                    >
                                        {u.toUpperCase()}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="p-4 space-y-6">
                        {isLoading && (
                            <div className="fixed inset-0 bg-white/80 z-50 flex flex-col items-center justify-center">
                                <div className="spinner"></div>
                                <p className="text-blue-900 font-bold text-xs mt-3 uppercase tracking-widest">Đang đồng bộ...</p>
                            </div>
                        )}

                        {/* Thẻ thống kê nhanh */}
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-orange-50 p-4 rounded-3xl border border-orange-100 flex items-center gap-3">
                                <div className="text-orange-600"><SvgIcon name="flame" /></div>
                                <div>
                                    <p className="text-[10px] font-bold text-orange-400 uppercase">Streak</p>
                                    <p className="font-black text-lg">5</p>
                                </div>
                            </div>
                            <div className="bg-blue-50 p-4 rounded-3xl border border-blue-100 flex items-center gap-3">
                                <div className="text-blue-600"><SvgIcon name="trophy" /></div>
                                <div>
                                    <p className="text-[10px] font-bold text-blue-400 uppercase">Đã xong</p>
                                    <p className="font-black text-lg">{appData.history.filter(h => h.user === currentUser).length}</p>
                                </div>
                            </div>
                        </div>

                        {/* Danh sách nhiệm vụ */}
                        <div className="space-y-4">
                            <h2 className="px-2 font-black text-slate-800 text-sm uppercase">Nhiệm vụ của bạn</h2>
                            {appData.goals.filter(g => g.user === currentUser).map((goal, i) => (
                                <div key={i} className="bg-slate-50 rounded-[2rem] border border-slate-100 overflow-hidden">
                                    <div className="px-6 py-3 bg-slate-100 border-b border-slate-200 text-[10px] font-black text-slate-500 uppercase">
                                        {goal.title}
                                    </div>
                                    <div className="divide-y divide-slate-100">
                                        {goal.tasks.map((task, j) => (
                                            <button 
                                                key={j} 
                                                onClick={() => setSelectedTask({ goal: goal.title, task: task })}
                                                className="w-full p-5 flex justify-between items-center card group text-left"
                                            >
                                                <span className="text-sm font-bold text-slate-600 group-hover:text-blue-600">{task}</span>
                                                <div className="text-slate-300"><SvgIcon name="chevron" /></div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Footer Nav */}
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-blue-900 text-white p-4 rounded-full shadow-2xl flex justify-around items-center">
                         <div className="flex flex-col items-center gap-1 opacity-100">
                             <SvgIcon name="trophy" />
                             <span className="text-[8px] font-bold">MỤC TIÊU</span>
                         </div>
                         <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                             <SvgIcon name="plus" />
                         </div>
                    </div>

                    {/* Modal hoàn thành */}
                    {selectedTask && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-end justify-center p-4">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 shadow-2xl space-y-6">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className="text-[10px] font-black text-blue-500 uppercase tracking-widest">{selectedTask.goal}</p>
                                        <h3 className="text-xl font-black text-slate-800">{selectedTask.task}</h3>
                                    </div>
                                    <button onClick={() => setSelectedTask(null)} className="p-2 bg-slate-100 rounded-full"><SvgIcon name="x" /></button>
                                </div>
                                <div className="space-y-4">
                                    <textarea id="taskResult" className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-900 transition-all" rows="3" placeholder="Hôm nay bạn đã đạt được gì?"></textarea>
                                    <label className="flex items-center justify-center gap-3 w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 cursor-pointer hover:bg-slate-50">
                                        <SvgIcon name="camera" />
                                        <span className="text-xs font-bold uppercase">Chụp bằng chứng</span>
                                        <input type="file" accept="image/*" className="hidden" id="taskImage" />
                                    </label>
                                    <button 
                                        onClick={() => {
                                            const res = document.getElementById('taskResult').value;
                                            const img = document.getElementById('taskImage').files[0];
                                            if(!res) return alert("Vui lòng nhập kết quả");
                                            handleComplete(res, img);
                                        }}
                                        className="w-full bg-blue-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95"
                                    >
                                        GỬI HOÀN THÀNH
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
