<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Tracker - Duke Version 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .blue-gradient { background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%); }
        .tab-active { background-color: white; color: #2563eb; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .tab-inactive { color: #64748b; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-24">

    <header class="blue-gradient text-white pt-8 pb-12 px-6 rounded-b-[2.5rem] shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight">Family Goals</h1>
                <p id="current-date" class="text-blue-100 text-xs mt-1 font-medium opacity-80"></p>
            </div>
            <div class="h-12 w-12 bg-white/20 rounded-2xl backdrop-blur-md flex items-center justify-center text-xl">🏠</div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 -mt-8">
        <div class="relative mb-4">
            <input type="text" id="search-input" oninput="renderDashboard()" placeholder="Tìm User hoặc Mục tiêu..." 
                   class="w-full p-4 pl-12 bg-white rounded-2xl shadow-sm border-none focus:ring-2 focus:ring-blue-400 outline-none transition-all">
            <span class="absolute left-4 top-4 opacity-30 text-lg">🔍</span>
        </div>

        <div id="user-quick-stats" class="flex gap-4 overflow-x-auto pb-4 hide-scrollbar">
            </div>

        <div class="flex bg-gray-200/50 p-1.5 rounded-2xl mb-6">
            <button onclick="switchTab('dashboard')" id="btn-dashboard" class="tab-btn w-1/3 py-2.5 rounded-xl font-bold tab-active">Dashboard</button>
            <button onclick="switchTab('statistic')" id="btn-statistic" class="tab-btn w-1/3 py-2.5 rounded-xl font-bold tab-inactive">Chi tiết</button>
            <button onclick="switchTab('add')" id="btn-add" class="tab-btn w-1/3 py-2.5 rounded-xl font-bold tab-inactive">Thêm</button>
        </div>

        <section id="tab-dashboard" class="space-y-4">
            <div id="goals-list" class="text-center py-10 text-gray-400 italic">Đang tải dữ liệu gia đình...</div>
        </section>

        <section id="tab-statistic" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4 text-blue-900">Báo cáo hiệu suất</h2>
                <div id="stats-list" class="space-y-6 text-sm"></div>
            </div>
        </section>

        <section id="tab-add" class="hidden">
            <div class="bg-white p-6 rounded-3xl shadow-sm border">
                <h2 class="text-xl font-bold mb-6 text-blue-900">Tạo mục tiêu mới</h2>
                <div class="space-y-4">
                    <input type="text" id="form-user" placeholder="Ai thực hiện? (Tài Đức, Vân...)" class="w-full p-4 bg-gray-50 rounded-2xl focus:ring-2 focus:ring-blue-400 outline-none">
                    <input type="text" id="form-goal" placeholder="Mục tiêu lớn (VD: Sức khỏe)" class="w-full p-4 bg-gray-50 rounded-2xl focus:ring-2 focus:ring-blue-400 outline-none">
                    <textarea id="form-tasks" placeholder="Các nhiệm vụ nhỏ (mỗi dòng 1 việc)..." rows="4" class="w-full p-4 bg-gray-50 rounded-2xl focus:ring-2 focus:ring-blue-400 outline-none"></textarea>
                    <button onclick="submitGoal()" class="w-full blue-gradient text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition">Tạo nhiệm vụ ngay</button>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-complete" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm">
            <h3 class="text-xl font-extrabold mb-4" id="modal-task-title">Xác nhận</h3>
            <div class="space-y-4">
                <input type="text" id="modal-result" placeholder="Kết quả thực hiện..." class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="file" id="modal-image" accept="image/*" class="w-full text-xs">
                <div class="flex gap-3 pt-2">
                    <button onclick="closeModal()" class="w-1/3 bg-gray-100 py-4 rounded-2xl font-bold text-gray-500">Hủy</button>
                    <button onclick="confirmComplete()" id="btn-confirm-save" class="w-2/3 blue-gradient text-white py-4 rounded-2xl font-bold">Hoàn thành</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxK66Jjtd_IvOkMBAEVglKCM9huiI0mDaWcC5cDqaVAze6_WyJlSGxsoergXDUBxwRz/exec';
        let rawData = [];
        let currentTask = null;

        const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });

        async function fetchData() {
            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getData' }) });
                rawData = await response.json();
                renderDashboard();
                renderStatistic();
            } catch (e) { console.error("Fetch error:", e); }
        }

        // Logic tính toán thống kê theo User
        function calculateUserStats(data) {
            const users = [...new Set(data.map(i => i.User))];
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();
            
            // Tính đầu tuần (Thứ 2)
            const startOfWeek = new Date(now);
            const day = now.getDay();
            const diff = now.getDate() - day + (day === 0 ? -6 : 1);
            startOfWeek.setDate(diff);
            startOfWeek.setHours(0,0,0,0);

            return users.map(user => {
                const uTasks = data.filter(i => i.User === user);
                const doneTasks = uTasks.filter(i => i.Status === 'Completed');
                
                const doneThisWeek = doneTasks.filter(i => {
                    const d = new Date(i.DateDone);
                    return d >= startOfWeek;
                }).length;

                const doneThisMonth = doneTasks.filter(i => {
                    const d = new Date(i.DateDone);
                    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
                }).length;

                return {
                    name: user,
                    total: uTasks.length,
                    done: doneTasks.length,
                    week: doneThisWeek,
                    month: doneThisMonth
                };
            });
        }

        function renderDashboard() {
            const list = document.getElementById('goals-list');
            const statsContainer = document.getElementById('user-quick-stats');
            const search = document.getElementById('search-input').value.toLowerCase();
            
            // 1. Render Quick Stats
            const userStats = calculateUserStats(rawData);
            statsContainer.innerHTML = userStats.map(stat => `
                <div class="min-w-[160px] bg-white p-4 rounded-3xl shadow-sm border border-blue-50 flex-shrink-0">
                    <p class="text-blue-600 font-extrabold text-sm mb-2 truncate">${stat.name}</p>
                    <div class="space-y-1 text-[11px] font-bold text-gray-500">
                        <div class="flex justify-between"><span>Tổng:</span> <span class="text-gray-800">${stat.done}/${stat.total}</span></div>
                        <div class="flex justify-between"><span>Tuần:</span> <span class="text-green-600">+${stat.week}</span></div>
                        <div class="flex justify-between"><span>Tháng:</span> <span class="text-blue-500">+${stat.month}</span></div>
                    </div>
                </div>
            `).join('');

            // 2. Render List Goals
            let filtered = rawData.filter(i => i.User.toLowerCase().includes(search) || i.Goal.toLowerCase().includes(search));
            const grouped = filtered.reduce((acc, item) => {
                const key = `${item.User} - ${item.Goal}`;
                if (!acc[key]) acc[key] = [];
                acc[key].push(item);
                return acc;
            }, {});

            if (Object.keys(grouped).length === 0) {
                list.innerHTML = `<div class="py-10 text-gray-400">Không tìm thấy nhiệm vụ nào</div>`;
                return;
            }

            list.innerHTML = '';
            for (let key in grouped) {
                const items = grouped[key];
                const allDone = items.every(i => i.Status === 'Completed');
                
                let tasksHtml = items.map(i => {
                    const isDone = i.Status === 'Completed';
                    return `
                        <div class="flex items-center justify-between p-4 ${isDone ? 'bg-green-50' : 'bg-white'} border-b border-gray-50 last:border-0 transition-colors">
                            <div class="flex items-center gap-3">
                                <div class="w-6 h-6 rounded-full flex items-center justify-center border ${isDone ? 'bg-green-500 border-green-500 text-white' : 'border-gray-200'}">
                                    ${isDone ? '✓' : ''}
                                </div>
                                <div class="flex flex-col text-left">
                                    <span class="${isDone ? 'text-green-700 font-bold' : 'text-gray-700'}">${i.Task}</span>
                                    ${i.Result ? `<span class="text-[10px] text-gray-400 font-medium">${i.Result}</span>` : ''}
                                </div>
                            </div>
                            ${!isDone ? `<button onclick="openCompleteModal('${i.User}','${i.Goal}','${i.Task.replace(/'/g, "\\'")}')" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg font-bold text-xs">XONG</button>` : ''}
                        </div>
                    `;
                }).join('');

                list.innerHTML += `
                    <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden mb-4">
                        <div class="p-4 bg-gray-50/50 flex justify-between items-center border-b border-gray-100">
                            <h3 class="font-bold text-gray-800 text-sm">${key}</h3>
                            ${allDone ? '<span class="bg-green-500 text-white text-[9px] px-2 py-0.5 rounded-full font-black uppercase">Hoàn thành</span>' : ''}
                        </div>
                        <div>${tasksHtml}</div>
                    </div>
                `;
            }
        }

        function renderStatistic() {
            const statsList = document.getElementById('stats-list');
            const stats = calculateUserStats(rawData);
            
            let html = '';
            stats.forEach(s => {
                const percent = Math.round((s.done / s.total) * 100) || 0;
                html += `
                    <div class="border-b border-gray-50 pb-6 last:border-0">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-bold text-blue-700 text-lg">${s.name}</span>
                            <span class="text-xs font-black text-gray-400 bg-gray-100 px-2 py-1 rounded-lg">${percent}%</span>
                        </div>
                        <div class="w-full h-2 bg-gray-100 rounded-full mb-4 overflow-hidden">
                            <div class="h-full bg-blue-500 transition-all duration-1000" style="width: ${percent}%"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-blue-50 p-4 rounded-2xl">
                                <p class="text-xl font-black text-blue-700">${s.done}/${s.total}</p>
                                <p class="text-[10px] text-blue-400 font-bold uppercase tracking-wider">Nhiệm vụ xong</p>
                            </div>
                            <div class="bg-green-50 p-4 rounded-2xl">
                                <p class="text-xl font-black text-green-700">+${s.week}</p>
                                <p class="text-[10px] text-green-400 font-bold uppercase tracking-wider">Tuần này</p>
                            </div>
                        </div>
                    </div>`;
            });
            statsList.innerHTML = html || 'Chưa có dữ liệu';
        }

        function openCompleteModal(user, goal, task) {
            currentTask = { user, goal, taskName: task };
            document.getElementById('modal-task-title').innerText = task;
            document.getElementById('modal-complete').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-complete').classList.add('hidden');
            document.getElementById('modal-result').value = '';
            document.getElementById('modal-image').value = '';
        }

        async function confirmComplete() {
            const result = document.getElementById('modal-result').value;
            const fileInput = document.getElementById('modal-image');
            if (!result) return alert('Anh hãy nhập kết quả nhé!');

            const btn = document.getElementById('btn-confirm-save');
            btn.disabled = true; btn.innerText = 'Đang lưu...';

            let base64 = null;
            let contentType = '';
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                contentType = file.type;
                base64 = await toBase64(file);
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'completeTask', data: { ...currentTask, result, image: base64, contentType } })
                });
                const resJson = await response.json();
                
                if (resJson.status === 'success') {
                    Toast.fire({ icon: 'success', title: 'Tuyệt vời!' });
                    closeModal();
                    await fetchData();
                } else {
                    alert('Lỗi: ' + resJson.message);
                }
            } catch (err) {
                alert('Lỗi kết nối!');
            } finally {
                btn.disabled = false; btn.innerText = 'Hoàn thành';
            }
        }

        async function submitGoal() {
            const user = document.getElementById('form-user').value.trim();
            const goal = document.getElementById('form-goal').value.trim();
            const tasks = document.getElementById('form-tasks').value.split('\n').filter(t => t.trim());
            if (!user || !goal || tasks.length === 0) return alert('Vui lòng điền đủ thông tin!');

            Swal.fire({ title: 'Đang tạo...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'addGoal', data: { user, goal, tasks } }) });
            
            document.getElementById('form-user').value = '';
            document.getElementById('form-goal').value = '';
            document.getElementById('form-tasks').value = '';
            Swal.close();
            switchTab('dashboard');
            fetchData();
        }

        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('tab-active'); b.classList.add('tab-inactive'); });
            document.getElementById(`btn-${tab}`).classList.add('tab-active');
        }

        const toBase64 = file => new Promise((res, rej) => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = () => res(r.result); r.onerror = e => rej(e);
        });

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        fetchData();
    </script>
</body>
</html>
