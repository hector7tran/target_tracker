<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Goals Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .blue-gradient { background: linear-gradient(135deg, #0052cc 0%, #007bff 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-20">

    <header class="blue-gradient text-white p-6 rounded-b-3xl shadow-lg mb-6">
        <h1 class="text-2xl font-bold">Family Tracking</h1>
        <p class="text-blue-100 text-sm">Chào Tài Đức, chúc gia đình ngày mới tốt lành!</p>
    </header>

    <div id="app" class="container mx-auto px-4 max-w-md">
        <div class="flex bg-white rounded-xl p-1 mb-6 shadow-sm border">
            <button onclick="switchTab('dashboard')" class="tab-btn w-1/2 py-2 rounded-lg font-semibold bg-blue-600 text-white">Dashboard</button>
            <button onclick="switchTab('add')" class="tab-btn w-1/2 py-2 rounded-lg font-semibold text-gray-500">Thêm Mục Tiêu</button>
        </div>

        <section id="tab-dashboard">
            <div id="goals-list" class="space-y-4">
                <div class="text-center py-10 text-gray-400">Đang tải dữ liệu...</div>
            </div>
        </section>

        <section id="tab-add" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h2 class="text-lg font-bold mb-4 text-blue-800">Tạo mục tiêu mới</h2>
                <div class="space-y-4">
                    <input type="text" id="form-user" placeholder="Tên người thực hiện" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">
                    <input type="text" id="form-goal" placeholder="Mục tiêu lớn (VD: Giảm cân)" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">
                    <textarea id="form-tasks" placeholder="Nhiệm vụ nhỏ (mỗi dòng 1 việc)" rows="4" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none"></textarea>
                    <button onclick="submitGoal()" class="w-full blue-gradient text-white font-bold py-3 rounded-xl shadow-blue-200 shadow-lg active:scale-95 transition">Lưu Mục Tiêu</button>
                </div>
            </div>
        </section>
    </div>

    <div id="modal-complete" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm">
            <h3 class="text-xl font-bold mb-4" id="modal-task-title">Xác nhận hoàn thành</h3>
            <div class="space-y-4">
                <input type="text" id="modal-result" placeholder="Kết quả (VD: Đã chạy 5km)" class="w-full p-3 border rounded-xl">
                <input type="file" id="modal-image" accept="image/*" class="w-full text-sm">
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="w-1/2 bg-gray-100 py-3 rounded-xl font-bold">Hủy</button>
                    <button onclick="confirmComplete()" class="w-1/2 blue-gradient text-white py-3 rounded-xl font-bold">Xong!</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxK66Jjtd_IvOkMBAEVglKCM9huiI0mDaWcC5cDqaVAze6_WyJlSGxsoergXDUBxwRz/exec'; // Thay URL sau khi Deploy GAS
        let rawData = [];
        let currentTask = null;

        // Optimistic UI Toast
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true
        });

        async function fetchData() {
            try {
                const res = await fetch(`${API_URL}?action=getData`, { method: 'POST', body: JSON.stringify({}) });
                rawData = await res.json();
                renderDashboard();
            } catch (e) { console.error("Lỗi fetch:", e); }
        }

        function renderDashboard() {
            const list = document.getElementById('goals-list');
            if (rawData.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-gray-400">Chưa có nhiệm vụ nào.</div>`;
                return;
            }

            // Group data by User & Goal
            const grouped = rawData.reduce((acc, item) => {
                const key = `${item.User} - ${item.Goal}`;
                if (!acc[key]) acc[key] = [];
                acc[key].push(item);
                return acc;
            }, {});

            list.innerHTML = '';
            for (let key in grouped) {
                const items = grouped[key];
                const completedCount = items.filter(i => i.Status === 'Completed').length;
                const progress = Math.round((completedCount / items.length) * 100);

                let tasksHtml = items.map(i => `
                    <div class="flex items-center justify-between p-3 border-b last:border-0">
                        <div class="flex flex-col">
                            <span class="${i.Status === 'Completed' ? 'line-through text-gray-400' : 'font-medium'}">${i.Task}</span>
                            ${i.Result ? `<span class="text-xs text-blue-500 italic">${i.Result}</span>` : ''}
                        </div>
                        ${i.Status === 'Pending' 
                            ? `<button onclick="openCompleteModal('${i.User}','${i.Goal}','${i.Task}')" class="bg-blue-50 text-blue-600 p-2 rounded-lg text-sm font-bold border border-blue-200">Hoàn thành</button>`
                            : `<span class="text-green-500 font-bold text-sm">✓ Done</span>`
                        }
                    </div>
                `).join('');

                list.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                        <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                            <div>
                                <h3 class="font-bold text-blue-900">${key}</h3>
                                <p class="text-xs text-gray-500">${items.length} nhiệm vụ con</p>
                            </div>
                            <div class="text-right">
                                <span class="text-xs font-bold text-blue-600">${progress}%</span>
                                <div class="w-16 h-1.5 bg-gray-200 rounded-full mt-1">
                                    <div class="h-full bg-blue-600 rounded-full" style="width: ${progress}%"></div>
                                </div>
                            </div>
                        </div>
                        <div>${tasksHtml}</div>
                    </div>
                `;
            }
        }

        function openCompleteModal(user, goal, task) {
            currentTask = { user, goal, taskName: task };
            document.getElementById('modal-task-title').innerText = task;
            document.getElementById('modal-complete').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-complete').classList.add('hidden');
            currentTask = null;
        }

        async function confirmComplete() {
            const result = document.getElementById('modal-result').value;
            const fileInput = document.getElementById('modal-image');
            
            // Optimistic UI: Cập nhật ngay trên màn hình
            Toast.fire({ icon: 'success', title: 'Đang xử lý ngầm...' });
            closeModal();

            let base64 = null;
            let contentType = '';
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                contentType = file.type;
                base64 = await toBase64(file);
            }

            const payload = { ...currentTask, result, image: base64, contentType };

            // Gửi dữ liệu lên Server
            fetch(`${API_URL}?action=completeTask`, {
                method: 'POST',
                body: JSON.stringify(payload)
            }).then(() => fetchData());
        }

        async function submitGoal() {
            const user = document.getElementById('form-user').value;
            const goal = document.getElementById('form-goal').value;
            const tasks = document.getElementById('form-tasks').value.split('\n').filter(t => t.trim() !== '');

            if (!user || !goal || tasks.length === 0) return alert('Vui lòng điền đủ thông tin');

            Toast.fire({ icon: 'info', title: 'Đang tạo mục tiêu...' });

            await fetch(`${API_URL}?action=addGoal`, {
                method: 'POST',
                body: JSON.stringify({ user, goal, tasks })
            });

            switchTab('dashboard');
            fetchData();
        }

        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
            event.target.classList.add('bg-blue-600', 'text-white');
            if (tab === 'dashboard') fetchData();
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // Khởi tạo
        fetchData();
    </script>
</body>
</html>
