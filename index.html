<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Goals 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        /* Tối ưu cho Mobile */
        input, textarea { font-size: 16px !important; } 
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // Cấu hình API của bạn
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxK66Jjtd_IvOkMBAEVglKCM9huiI0mDaWcC5cDqaVAze6_WyJlSGxsoergXDUBxwRz/exec";

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [currentUser, setCurrentUser] = useState('Tài Đức');
            const [appData, setAppData] = useState({ goals: [], history: [] });
            const [isLoading, setIsLoading] = useState(true);
            const [selectedTask, setSelectedTask] = useState(null);
            const [viewDate, setViewDate] = useState(new Date());
            const [newGoal, setNewGoal] = useState({ user: '', goal: '', tasks: [''] });

            // Lấy Icon từ thư viện LucideReact
            const { 
                Trophy, Calendar, Settings, Plus, CheckCircle2, 
                Camera, ChevronRight, Flame, X, ChevronLeft 
            } = LucideReact;

            useEffect(() => { 
                fetchData(); 
            }, []);

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const response = await fetch(`${GAS_URL}?action=getAppData`);
                    const data = await response.json();
                    if (data && data.goals) {
                        setAppData(data);
                    }
                } catch (e) {
                    console.error("Lỗi kết nối GAS:", e);
                    // Dữ liệu dự phòng để app không bị trắng trang
                    setAppData({
                        goals: [
                            { user: 'Tài Đức', title: 'Mục tiêu 2026', tasks: ['Đi tập Gym', 'Học BĐS'] },
                            { user: 'Hồng Vân', title: 'Mục tiêu 2026', tasks: ['Làm bánh Âu', 'Tập bơi'] }
                        ],
                        history: []
                    });
                } finally {
                    setIsLoading(false);
                }
            };

            const handleAction = async (action, data) => {
                setIsLoading(true);
                try {
                    // Sử dụng phương thức gửi dữ liệu an toàn cho GAS
                    await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        cache: 'no-cache',
                        body: JSON.stringify({ action, data })
                    });
                    // Đợi 3 giây để GAS xử lý xong mới fetch lại
                    setTimeout(fetchData, 3000);
                } catch (e) {
                    alert("Có lỗi xảy ra khi gửi dữ liệu!");
                    setIsLoading(false);
                }
            };

            const calendarDays = useMemo(() => {
                const year = viewDate.getFullYear();
                const month = viewDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push({ day: null, fullDate: null });
                for (let i = 1; i <= daysInMonth; i++) {
                    const d = i < 10 ? `0${i}` : i;
                    const m = (month + 1) < 10 ? `0${month + 1}` : month + 1;
                    days.push({ day: i, fullDate: `${year}-${m}-${d}` });
                }
                return days;
            }, [viewDate]);

            const users = useMemo(() => {
                return appData.goals.length > 0 ? [...new Set(appData.goals.map(g => g.user))] : ['Tài Đức', 'Hồng Vân'];
            }, [appData.goals]);

            return (
                <div className="min-h-screen pb-24 max-w-lg mx-auto bg-slate-50 shadow-inner">
                    {/* Header */}
                    <header className="bg-blue-900 text-white p-6 rounded-b-[2.5rem] shadow-xl sticky top-0 z-40">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-xl font-black italic tracking-tighter uppercase">Family 2026</h1>
                                <p className="text-blue-300 text-[9px] font-bold uppercase tracking-widest mt-1">Đồng hành cùng {currentUser}</p>
                            </div>
                            <div className="flex -space-x-2">
                                {users.map(u => (
                                    <button key={u} onClick={() => setCurrentUser(u)} className={`w-10 h-10 rounded-full border-2 flex items-center justify-center text-[10px] font-black transition-all ${currentUser === u ? 'border-white bg-blue-500 scale-110 shadow-lg' : 'border-blue-400 bg-blue-800 opacity-40'}`}>
                                        {u.substring(0, 2).toUpperCase()}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="p-4 mt-2">
                        {isLoading && (
                            <div className="fixed inset-0 bg-white/70 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
                                <div className="animate-spin rounded-full h-8 w-8 border-4 border-blue-900 border-t-transparent mb-2"></div>
                                <p className="text-blue-900 text-[10px] font-black uppercase">Đang đồng bộ dữ liệu...</p>
                            </div>
                        )}

                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-blue-50 flex items-center gap-3">
                                        <Flame className="text-orange-500 w-6 h-6" />
                                        <div><p className="text-[9px] text-gray-400 font-black uppercase">Streak</p><p className="font-bold text-lg text-slate-700">5 Ngày</p></div>
                                    </div>
                                    <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-blue-50 flex items-center gap-3">
                                        <Trophy className="text-blue-600 w-6 h-6" />
                                        <div><p className="text-[9px] text-gray-400 font-black uppercase">Đã xong</p><p className="font-bold text-lg text-slate-700">{appData.history.filter(h => h.user === currentUser).length}</p></div>
                                    </div>
                                </div>

                                {appData.goals.filter(g => g.user === currentUser).length > 0 ? (
                                    appData.goals.filter(g => g.user === currentUser).map((goal, i) => (
                                        <div key={i} className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                                            <div className="bg-blue-50/50 px-6 py-4 border-b border-blue-100 flex justify-between items-center">
                                                <span className="font-bold text-blue-900 text-xs uppercase tracking-tight">{goal.title}</span>
                                                <span className="text-[9px] font-black text-blue-500 bg-white px-2 py-1 rounded-full">{goal.tasks.length} VIỆC</span>
                                            </div>
                                            <div className="divide-y divide-slate-50">
                                                {goal.tasks.map((task, j) => (
                                                    <button key={j} onClick={() => setSelectedTask({ goal: goal.title, task: task })} className="w-full flex items-center justify-between p-5 hover:bg-slate-50 active:bg-blue-50 transition text-left group">
                                                        <span className="text-sm font-semibold text-slate-600 group-hover:text-blue-600">{task}</span>
                                                        <ChevronRight className="w-4 h-4 text-slate-300" />
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    <div className="text-center py-20 bg-white rounded-[2rem] border-2 border-dashed border-slate-200">
                                        <p className="text-slate-400 text-xs font-bold uppercase">Chưa có mục tiêu nào</p>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'calendar' && (
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 animate-in">
                                <div className="flex items-center justify-between mb-6">
                                    <button onClick={() => setViewDate(new Date(viewDate.setMonth(viewDate.getMonth() - 1)))}><ChevronLeft className="w-5 h-5"/></button>
                                    <h3 className="font-black text-blue-900 text-sm uppercase">Tháng {viewDate.getMonth() + 1}, {viewDate.getFullYear()}</h3>
                                    <button onClick={() => setViewDate(new Date(viewDate.setMonth(viewDate.getMonth() + 1)))}><ChevronRight className="w-5 h-5"/></button>
                                </div>
                                <div className="grid grid-cols-7 gap-1">
                                    {['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'].map(d => <div key={d} className="text-center text-[9px] font-black text-slate-300 py-2 uppercase">{d}</div>)}
                                    {calendarDays.map((date, i) => {
                                        const logs = appData.history.filter(h => h.timestamp && h.timestamp.split('T')[0] === date.fullDate);
                                        return (
                                            <div key={i} className="aspect-square flex flex-col items-center justify-center relative">
                                                {date.day && (
                                                    <>
                                                        <span className={`text-xs font-bold ${date.fullDate === new Date().toISOString().split('T')[0] ? 'text-blue-600 font-black' : 'text-slate-400'}`}>{date.day}</span>
                                                        <div className="flex gap-0.5 mt-0.5">
                                                            {logs.map((h, idx) => <div key={idx} className={`w-1 h-1 rounded-full ${h.user === 'Tài Đức' ? 'bg-blue-600' : 'bg-pink-500'}`}></div>)}
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 animate-in">
                                <h3 className="font-black text-blue-900 text-sm uppercase mb-6 flex items-center gap-2"><Plus className="w-4 h-4" /> Thêm mục tiêu mới</h3>
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Người thực hiện</label>
                                        <input placeholder="Tên (VD: Hồng Vân)" className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl p-4 text-sm outline-none transition-all" value={newGoal.user} onChange={e => setNewGoal({...newGoal, user: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Mục tiêu tổng quát</label>
                                        <input placeholder="Mục tiêu (VD: Khóa học làm bánh)" className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl p-4 text-sm outline-none transition-all" value={newGoal.goal} onChange={e => setNewGoal({...newGoal, goal: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Nhiệm vụ con</label>
                                        {newGoal.tasks.map((t, idx) => (
                                            <input key={idx} placeholder={`Nhiệm vụ ${idx + 1}`} className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl p-4 text-sm outline-none mb-2 transition-all" value={t} onChange={e => {
                                                const nt = [...newGoal.tasks]; nt[idx] = e.target.value; setNewGoal({...newGoal, tasks: nt});
                                            }} />
                                        ))}
                                    </div>
                                    <button onClick={() => setNewGoal({...newGoal, tasks: [...newGoal.tasks, '']})} className="w-full py-3 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-[10px] font-black uppercase tracking-tighter transition-all hover:bg-slate-50">+ Thêm nhiệm vụ</button>
                                    <button onClick={() => handleAction("saveNewGoal", newGoal)} className="w-full bg-blue-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all">LƯU KẾ HOẠCH</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 p-4 pb-8 flex justify-around z-50 shadow-2xl">
                        <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center gap-1 ${activeTab === 'dashboard' ? 'text-blue-900' : 'text-slate-300'}`}><Trophy className="w-5 h-5" /><span className="text-[8px] font-black uppercase">Mục tiêu</span></button>
                        <button onClick={() => setActiveTab('calendar')} className={`flex flex-col items-center gap-1 ${activeTab === 'calendar' ? 'text-blue-900' : 'text-slate-300'}`}><CalendarIcon className="w-5 h-5" /><span className="text-[8px] font-black uppercase">Lịch</span></button>
                        <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center gap-1 ${activeTab === 'settings' ? 'text-blue-900' : 'text-slate-300'}`}><Settings className="w-5 h-5" /><span className="text-[8px] font-black uppercase">Cài đặt</span></button>
                    </nav>

                    {/* Modal Hoàn Thành */}
                    {selectedTask && (
                        <div className="fixed inset-0 bg-blue-900/40 backdrop-blur-md z-[60] flex items-end sm:items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl animate-in">
                                <div className="flex justify-between items-start mb-6">
                                    <div><p className="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-1">{selectedTask.goal}</p><h3 className="text-lg font-black text-slate-800 leading-tight">{selectedTask.task}</h3></div>
                                    <button onClick={() => setSelectedTask(null)} className="bg-slate-100 p-2 rounded-full"><X className="w-4 h-4" /></button>
                                </div>
                                <div className="space-y-5">
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Kết quả / Cảm nhận</label>
                                        <textarea id="taskResult" className="w-full bg-slate-50 rounded-2xl p-4 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all" rows="3" placeholder="Chia sẻ thành quả hôm nay..."></textarea>
                                    </div>
                                    <label className="flex items-center justify-center gap-3 w-full py-4 border-2 border-dashed border-slate-200 rounded-[2rem] text-slate-400 cursor-pointer hover:bg-slate-50 transition-all">
                                        <Camera className="w-5 h-5" /> <span className="text-[10px] font-black uppercase">Chụp bằng chứng</span>
                                        <input type="file" accept="image/*" className="hidden" id="taskImage" />
                                    </label>
                                    <button onClick={() => {
                                        const res = document.getElementById('taskResult').value;
                                        const img = document.getElementById('taskImage');
                                        if (!res) return alert("Hãy nhập kết quả!");
                                        const send = (b64) => {
                                            const d = { user: currentUser, goal: selectedTask.goal, task: selectedTask.task, result: res, image: b64, fileName: `EVI_${Date.now()}.jpg` };
                                            handleAction("completeTask", d);
                                            setSelectedTask(null);
                                        };
                                        if (img.files[0]) {
                                            const r = new FileReader(); r.onload = (e) => send(e.target.result); r.readAsDataURL(img.files[0]);
                                        } else send(null);
                                    }} className="w-full bg-blue-900 text-white py-5 rounded-[2rem] font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all">GỬI HOÀN THÀNH</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
