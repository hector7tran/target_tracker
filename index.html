<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Goals 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <style>
        body { font-family: sans-serif; background: #f8fafc; margin: 0; }
        #error-display { display: none; background: #fee2e2; color: #991b1b; padding: 20px; margin: 10px; border-radius: 10px; border: 1px solid #f87171; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div id="error-display"></div>
    <div id="root">
        <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; color:#1e3a8a;">
            <div style="border:4px solid #f3f3f3; border-top:4px solid #1e3a8a; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite;"></div>
            <p style="margin-top:15px; font-weight:bold; font-size:14px;">ĐANG KHỞI CHẠY APP...</p>
        </div>
    </div>

    <script>
        // TRÌNH KIỂM TRA LỖI TOÀN CỤC
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const display = document.getElementById('error-display');
            display.style.display = 'block';
            display.innerHTML += `LỖI: ${msg}\nDòng: ${lineNo}\nCột: ${columnNo}\n`;
            return false;
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { Trophy, Calendar: CalendarIcon, Settings, Plus, CheckCircle2, Camera, ChevronRight, Flame, X, ChevronLeft } = LucideReact;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbxK66Jjtd_IvOkMBAEVglKCM9huiI0mDaWcC5cDqaVAze6_WyJlSGxsoergXDUBxwRz/exec";

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [currentUser, setCurrentUser] = useState('Tài Đức');
            const [appData, setAppData] = useState({ goals: [], history: [] });
            const [isLoading, setIsLoading] = useState(true);
            const [selectedTask, setSelectedTask] = useState(null);
            const [viewDate, setViewDate] = useState(new Date());

            useEffect(() => { 
                fetchData(); 
            }, []);

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const res = await fetch(`${GAS_URL}?action=getAppData`);
                    if (!res.ok) throw new Error("Không thể kết nối GAS");
                    const data = await res.json();
                    setAppData(data || { goals: [], history: [] });
                } catch (e) {
                    console.error(e);
                    // Dữ liệu dự phòng nếu lỗi
                    setAppData({
                        goals: [
                            { user: 'Tài Đức', title: 'Mục tiêu 2026', tasks: ['Đi tập Gym', 'Học BĐS'] },
                            { user: 'Hồng Vân', title: 'Mục tiêu 2026', tasks: ['Làm bánh Âu', 'Tập bơi'] }
                        ],
                        history: []
                    });
                } finally {
                    setIsLoading(false);
                }
            };

            const handleAction = async (action, data) => {
                setIsLoading(true);
                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action, data })
                    });
                    setTimeout(fetchData, 3000);
                } catch (e) {
                    alert("Lỗi gửi dữ liệu!");
                    setIsLoading(false);
                }
            };

            const calendarDays = useMemo(() => {
                const year = viewDate.getFullYear();
                const month = viewDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push({ day: null, fullDate: null });
                for (let i = 1; i <= daysInMonth; i++) {
                    const d = i < 10 ? `0${i}` : i;
                    const m = (month + 1) < 10 ? `0${month + 1}` : month + 1;
                    days.push({ day: i, fullDate: `${year}-${m}-${d}` });
                }
                return days;
            }, [viewDate]);

            const users = appData.goals.length > 0 ? [...new Set(appData.goals.map(g => g.user))] : ['Tài Đức', 'Hồng Vân'];

            return (
                <div className="min-h-screen pb-20 max-w-lg mx-auto bg-slate-50">
                    <header className="bg-blue-900 text-white p-6 rounded-b-[2.5rem] shadow-xl sticky top-0 z-40">
                        <div className="flex justify-between items-center">
                            <h1 className="text-xl font-black italic tracking-tighter uppercase">Family 2026</h1>
                            <div className="flex -space-x-2">
                                {users.map(u => (
                                    <button key={u} onClick={() => setCurrentUser(u)} className={`w-10 h-10 rounded-full border-2 text-[10px] font-bold ${currentUser === u ? 'border-white bg-blue-500 scale-110 shadow-lg' : 'border-blue-400 bg-blue-800 opacity-40'}`}>
                                        {u.substring(0, 2).toUpperCase()}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="p-4">
                        {isLoading && (
                            <div className="fixed inset-0 bg-white/70 z-[100] flex flex-col items-center justify-center">
                                <div className="animate-spin rounded-full h-8 w-8 border-4 border-blue-900 border-t-transparent"></div>
                                <p className="text-blue-900 text-[10px] font-black mt-2">ĐANG ĐỒNG BỘ...</p>
                            </div>
                        )}

                        {activeTab === 'dashboard' && (
                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white p-4 rounded-3xl shadow-sm border border-blue-50 flex items-center gap-3">
                                        <Flame className="text-orange-500 w-5 h-5" />
                                        <div><p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Streak</p><p className="font-bold text-lg">5</p></div>
                                    </div>
                                    <div className="bg-white p-4 rounded-3xl shadow-sm border border-blue-50 flex items-center gap-3">
                                        <Trophy className="text-blue-600 w-5 h-5" />
                                        <div><p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Xong</p><p className="font-bold text-lg">{appData.history.filter(h => h.user === currentUser).length}</p></div>
                                    </div>
                                </div>

                                {appData.goals.filter(g => g.user === currentUser).map((goal, i) => (
                                    <div key={i} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                                        <div className="bg-blue-50 px-5 py-3 border-b border-blue-100 flex justify-between">
                                            <span className="font-bold text-blue-900 text-xs uppercase">{goal.title}</span>
                                        </div>
                                        <div className="divide-y divide-slate-50">
                                            {goal.tasks.map((task, j) => (
                                                <button key={j} onClick={() => setSelectedTask({ goal: goal.title, task: task })} className="w-full flex items-center justify-between p-5 text-left active:bg-blue-50">
                                                    <span className="text-sm font-semibold text-slate-600">{task}</span>
                                                    <ChevronRight className="w-4 h-4 text-slate-300" />
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'calendar' && (
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                <div className="flex items-center justify-between mb-4">
                                    <button onClick={() => setViewDate(new Date(viewDate.setMonth(viewDate.getMonth() - 1)))}><ChevronLeft /></button>
                                    <h3 className="font-bold text-blue-900 text-sm uppercase">T{viewDate.getMonth() + 1}/{viewDate.getFullYear()}</h3>
                                    <button onClick={() => setViewDate(new Date(viewDate.setMonth(viewDate.getMonth() + 1)))}><ChevronRight /></button>
                                </div>
                                <div className="grid grid-cols-7 gap-1">
                                    {['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'].map(d => <div key={d} className="text-center text-[8px] font-black text-slate-300 uppercase">{d}</div>)}
                                    {calendarDays.map((date, i) => {
                                        const logs = appData.history.filter(h => h.timestamp && h.timestamp.split('T')[0] === date.fullDate);
                                        return (
                                            <div key={i} className="aspect-square flex flex-col items-center justify-center relative">
                                                {date.day && (
                                                    <>
                                                        <span className={`text-xs ${date.fullDate === new Date().toISOString().split('T')[0] ? 'text-blue-600 font-black' : 'text-slate-400'}`}>{date.day}</span>
                                                        <div className="flex gap-0.5 mt-0.5">
                                                            {logs.map((h, idx) => <div key={idx} className={`w-1 h-1 rounded-full ${h.user === 'Tài Đức' ? 'bg-blue-600' : 'bg-pink-500'}`}></div>)}
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 p-4 pb-6 flex justify-around z-50 shadow-lg">
                        <button onClick={() => setActiveTab('dashboard')} className={activeTab === 'dashboard' ? 'text-blue-900' : 'text-slate-300'}><Trophy /></button>
                        <button onClick={() => setActiveTab('calendar')} className={activeTab === 'calendar' ? 'text-blue-900' : 'text-slate-300'}><CalendarIcon /></button>
                    </nav>

                    {selectedTask && (
                        <div className="fixed inset-0 bg-blue-900/40 backdrop-blur-md z-[60] flex items-end justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl">
                                <div className="flex justify-between items-start mb-4">
                                    <div><p className="text-[9px] font-black text-blue-400 uppercase tracking-widest">{selectedTask.goal}</p><h3 className="text-lg font-bold leading-tight">{selectedTask.task}</h3></div>
                                    <button onClick={() => setSelectedTask(null)}><X /></button>
                                </div>
                                <div className="space-y-4">
                                    <textarea id="taskResult" className="w-full bg-slate-50 rounded-2xl p-4 text-sm outline-none focus:ring-2 focus:ring-blue-500" rows="3" placeholder="Kết quả..."></textarea>
                                    <button onClick={() => {
                                        const res = document.getElementById('taskResult').value;
                                        if (!res) return alert("Nhập kết quả!");
                                        handleAction("completeTask", { user: currentUser, goal: selectedTask.goal, task: selectedTask.task, result: res });
                                        setSelectedTask(null);
                                    }} className="w-full bg-blue-900 text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-xl">GỬI</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
